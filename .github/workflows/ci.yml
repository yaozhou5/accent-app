name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npx eslint . --max-warnings=-1

      - name: Format check
        run: npm run format:check

      # - name: Test
      #   run: npm test
      # No test runner installed yet. Uncomment when vitest/jest is added.

      - name: Build
        run: npm run build
